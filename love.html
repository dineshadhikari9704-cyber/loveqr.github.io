<!DOCTYPE html>
<html>
<head>
  <title>💖 For You 💖</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top, #2a001f, #000000);
      color: white;
    }

    /* 🌙 cinematic glow overlay */
    .overlay {
      position: fixed;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(255,77,109,0.2), transparent);
      z-index: 1;
    }

    /* 💖 main card */
    .card {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(15px);
      padding: 35px;
      border-radius: 25px;
      text-align: center;
      width: 340px;
      z-index: 5;
      box-shadow: 0 0 40px rgba(255, 77, 109, 0.3);
      animation: fadeIn 2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%, -60%); }
      to { opacity: 1; transform: translate(-50%, -50%); }
    }

    h2 {
      font-size: 20px;
    }

    button {
      padding: 10px 18px;
      margin: 10px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 15px;
      transition: 0.3s;
    }

    #yesBtn {
      background: #ffffff;
      color: #ff4d6d;
      font-weight: bold;
    }

    #yesBtn:hover {
      transform: scale(1.1);
    }

    #noBtn {
      background: transparent;
      border: 2px solid white;
      color: white;
      position: absolute;
    }

    #message {
      display: none;
      margin-top: 15px;
      font-size: 15px;
      line-height: 1.6;
      animation: fadeIn 1.5s ease;
    }

    #photo {
      display: none;
      margin-top: 15px;
      width: 160px;
      height: 160px;
      border-radius: 18px;
      object-fit: cover;
      box-shadow: 0 0 25px rgba(255,77,109,0.6);
      animation: fadeIn 2s ease;
    }

    /* ✨ floating emojis */
    .emoji {
      position: fixed;
      font-size: 22px;
      animation: float 6s linear infinite;
      z-index: 2;
    }

    @keyframes float {
      0% { transform: translateY(100vh); opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }
  </style>
</head>

<body>

<div class="overlay"></div>

<div class="card">
  <h2>💖 Do you love me? 💖</h2>

  <button id="yesBtn" onclick="loveYes()">Yes 💖✨</button>
  <button id="noBtn" onmouseover="runAway()">No 💔😆</button>

  <div id="message">
    🌹💫 <b>I LOVE YOU</b> 💫🌹<br><br>
    💕 You are my universe 🌌<br>
    💖 My happiness 😍<br>
    🕊️ My peace<br>
    💫 My forever story<br><br>
    ❤️ Forever & always ❤️
  </div>

  <img id="photo" src="your-photo.jpg">
</div>

<!-- THREE.JS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>

<script>
let scene, camera, renderer, particles = [];

function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.z = 5;

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);
}

function createFirework() {
  const geometry = new THREE.BufferGeometry();
  const count = 60;

  const positions = [];
  const velocities = [];

  for (let i = 0; i < count; i++) {
    positions.push(0,0,0);

    velocities.push(
      (Math.random()-0.5)*0.15,
      (Math.random()-0.5)*0.15,
      (Math.random()-0.5)*0.15
    );
  }

  geometry.setAttribute("position", new THREE.Float32BufferAttribute(positions,3));

  const material = new THREE.PointsMaterial({
    color: new THREE.Color(`hsl(${Math.random()*360},100%,60%)`),
    size: 0.06
  });

  const points = new THREE.Points(geometry, material);
  points.userData.vel = velocities;

  scene.add(points);
  particles.push(points);
}

function animate() {
  requestAnimationFrame(animate);

  particles.forEach(p => {
    const pos = p.geometry.attributes.position.array;
    const vel = p.userData.vel;

    for (let i=0;i<pos.length;i+=3) {
      pos[i] += vel[i];
      pos[i+1] += vel[i+1];
      pos[i+2] += vel[i+2];
    }

    p.geometry.attributes.position.needsUpdate = true;
  });

  renderer.render(scene,camera);
}

function loveYes() {
  document.getElementById("message").style.display = "block";
  document.getElementById("photo").style.display = "block";

  // 🎆 cinematic fireworks burst
  for (let i=0;i<6;i++) {
    setTimeout(createFirework, i*400);
  }

  // 💖 floating emojis
  let emojis = ["💖","💕","✨","🌹","💫","❤️","😍"];
  for (let i=0;i<40;i++) {
    let e = document.createElement("div");
    e.className = "emoji";
    e.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
    e.style.left = Math.random()*100+"vw";
    e.style.animationDuration = (4+Math.random()*3)+"s";
    document.body.appendChild(e);
  }
}

function runAway() {
  let b = document.getElementById("noBtn");
  b.style.left = Math.random()*250+"px";
  b.style.top = Math.random()*250+"px";
}

init();
animate();
</script>

</body>
</html>
